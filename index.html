<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        h3 { margin-top: 0; text-align: center; }
        select, input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; background: #fff; }
        
        .meta-row { display: flex; gap: 10px; }
        .meta-row > div { flex: 1; }
        label { font-size: 12px; margin-bottom: 5px; display: block; opacity: 0.8; font-weight: bold; }

        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .item-name { flex: 1; padding-right: 10px; font-size: 14px; }
        .item-input { width: 80px; margin-bottom: 0; text-align: center; border: 1px solid var(--tg-theme-button-color); }
        
        /* Стили корзины */
        #summary-container { margin-top: 15px; border-top: 2px solid #eee; padding-top: 10px; }
        .summary-item { 
            background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; 
            margin-bottom: 8px; font-size: 13px; position: relative;
            border-left: 5px solid var(--tg-theme-button-color);
        }
        .remove-btn { color: #ff4d4d; font-weight: bold; float: right; cursor: pointer; padding: 0 5px; }

        /* Кнопки */
        .btn-green { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; margin-bottom: 15px; font-weight: bold; cursor: pointer; }
        #submit-btn { width: 100%; padding: 15px; background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px; }
        
        /* Секция своей работы */
        .custom-work-box { 
            background: rgba(40, 167, 69, 0.1); 
            padding: 15px; border-radius: 12px; border: 2px dashed #28a745; margin-top: 20px; margin-bottom: 20px;
        }
        .custom-work-box h4 { margin: 0 0 10px 0; color: #28a745; }
    </style>
</head>
<body>
    <h3>Сборный отчет ГИК</h3>
    
    <div class="meta-info">
        <label>Дата</label>
        <input type="date" id="report-date">
        <div class="meta-row">
            <div>
                <label>Блок</label>
                <select id="block-num">
                    <option value="17">17</option><option value="18">18</option>
                    <option value="22">22</option><option value="23">23</option>
                    <option value="24">24</option><option value="25">25</option>
                    <option value="26">26</option><option value="27">27</option>
                    <option value="28">28</option><option value="29">29</option>
                </select>
            </div>
            <div>
                <label>Этаж</label>
                <select id="floor-num">
                    <option value="Крыша">Крыша</option>
                    <script>for(let i=24;i>=1;i--) document.write(`<option value="${i}">${i} эт.</option>`);</script>
                    <option value="-1">-1 эт.</option><option value="-2">-2 эт.</option>
                </select>
            </div>
        </div>
    </div>

    <hr style="border:0; border-top:1px solid #eee;">

    <label>Выбрать из готового списка:</label>
    <select id="section" onchange="loadCategories()">
        <option value="">1. Выберите раздел...</option>
        <option value="Стр">Строительство</option>
        <option value="Эм">Электромонтаж</option>
        <option value="Мех">Механика</option>
    </select>
    <select id="category" onchange="loadItems()" style="display:none;"></select>
    
    <div id="items-container"></div>
    <button id="add-btn" class="btn-green" style="display:none;" onclick="addToBasket()">➕ Добавить выбранное</button>

    <div class="custom-work-box">
        <h4>✍️ Добавить новую работу</h4>
        <label>Название работы (которой нет в списке)</label>
        <input type="text" id="custom-name" placeholder="Например: Покраска дверей">
        <label>Объем</label>
        <input type="number" id="custom-value" step="any" inputmode="decimal" placeholder="0.00">
        <button class="btn-green" style="background:#6c757d;" onclick="addCustomToBasket()">➕ Добавить свою работу</button>
    </div>

    <div id="summary-container"></div>
    <button id="submit-btn" style="display:none;" onclick="sendToBot()">🚀 Отправить отчет (0)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('report-date').valueAsDate = new Date();

        let finalBasket = []; 

        const allData = {
            "Стр": {
                "Кладка": ["Газоблок 600*300*200 (шт)","Газоблок 600*300*100 (шт)"],
                "Отделка": ["Штукатурка стен (м2)", "Стяжка пола (м2)"]
            },
            "Эм": {
                "Кабель": ["Монтаж Кабель 3х1,5 (м)", "Монтаж Кабель 3х2,5 (м)"],
                "Щиты": ["Установка ЩК (шт)", "Установка ЩЭ (шт)"]
            },
            "Мех": {
                "Трубы": ["Монтаж трубы ППР 20 (м)", "Монтаж трубы ППР 25 (м)"]
            }
        };

        function loadCategories() {
            const section = document.getElementById('section').value;
            const cat = document.getElementById('category');
            document.getElementById('items-container').innerHTML = '';
            if(!section) { cat.style.display='none'; return; }
            cat.innerHTML = '<option value="">2. Выберите категорию...</option>';
            for(let c in allData[section]) cat.innerHTML += `<option value="${c}">${c}</option>`;
            cat.style.display = 'block';
        }

        function loadItems() {
            const section = document.getElementById('section').value;
            const category = document.getElementById('category').value;
            const div = document.getElementById('items-container');
            div.innerHTML = '';
            if(!category) { document.getElementById('add-btn').style.display='none'; return; }
            
            allData[section][category].forEach((item) => {
                div.innerHTML += `
                    <div class="item-row">
                        <div class="item-name">${item}</div>
                        <input type="number" inputmode="decimal" step="any" class="item-input" data-name="${item}" placeholder="0">
                    </div>`;
            });
            document.getElementById('add-btn').style.display = 'block';
        }

        // Добавление из списка
        function addToBasket() {
            const dateVal = document.getElementById('report-date').value; 
            const block = document.getElementById('block-num').value;
            const floor = document.getElementById('floor-num').value;
            const inputs = document.querySelectorAll('.item-input');
            let hasData = false;

            inputs.forEach(input => {
                const val = parseFloat(input.value);
                if (val > 0) {
                    finalBasket.push({
                        date: dateVal, block: block, floor: floor,
                        name: input.getAttribute('data-name'), value: val
                    });
                    input.value = ''; 
                    hasData = true;
                }
            });

            if(hasData) {
                renderSummary();
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        // ФУНКЦИЯ ДЛЯ НОВОЙ (СВОЕЙ) РАБОТЫ
        function addCustomToBasket() {
            const dateVal = document.getElementById('report-date').value;
            const block = document.getElementById('block-num').value;
            const floor = document.getElementById('floor-num').value;
            const nameInput = document.getElementById('custom-name');
            const valueInput = document.getElementById('custom-value');
            
            const name = nameInput.value.trim();
            const val = parseFloat(valueInput.value);

            if (name && val > 0) {
                finalBasket.push({
                    date: dateVal, block: block, floor: floor,
                    name: "📌 " + name, // Пометка, что работа добавлена вручную
                    value: val
                });
                nameInput.value = '';
                valueInput.value = '';
                renderSummary();
                tg.HapticFeedback.impactOccurred('medium');
            } else {
                tg.showAlert("Введите название и объем!");
            }
        }

        function renderSummary() {
            const container = document.getElementById('summary-container');
            container.innerHTML = '<b>Список к отправке:</b><br>';
            finalBasket.forEach((item, index) => {
                container.innerHTML += `
                    <div class="summary-item">
                        <span class="remove-btn" onclick="removeItem(${index})">✖</span>
                        <b>${item.date} | Бл. ${item.block}, эт. ${item.floor}</b><br>
                        ${item.name}: ${item.value}
                    </div>`;
            });
            const btn = document.getElementById('submit-btn');
            btn.style.display = finalBasket.length > 0 ? 'block' : 'none';
            btn.innerText = `🚀 Отправить отчет (${finalBasket.length})`;
        }

        function removeItem(index) {
            finalBasket.splice(index, 1);
            renderSummary();
        }

        function sendToBot() {
            tg.sendData(JSON.stringify({ items: finalBasket }));
        }
    </script>
</body>
</html>
