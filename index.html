<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        h3 { margin-top: 0; text-align: center; }
        select, input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; background: #fff; }
        
        .meta-row { display: flex; gap: 10px; }
        .meta-row > div { flex: 1; }
        label { font-size: 12px; margin-bottom: 5px; display: block; opacity: 0.8; font-weight: bold; }

        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .item-name { flex: 1; padding-right: 10px; font-size: 14px; }
        .item-input { width: 80px; margin-bottom: 0; text-align: center; border: 1px solid var(--tg-theme-button-color); }
        
        /* Стили корзины */
        #summary-container { margin-top: 15px; border-top: 2px solid #eee; padding-top: 10px; }
        .summary-item { 
            background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; 
            margin-bottom: 8px; font-size: 13px; position: relative;
            border-left: 5px solid var(--tg-theme-button-color);
        }
        .remove-btn { color: #ff4d4d; font-weight: bold; float: right; cursor: pointer; padding: 0 5px; }

        #add-btn { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; margin-bottom: 15px; font-weight: bold; }
        #submit-btn { width: 100%; padding: 15px; background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>Сборный отчет ГИК</h3>
    
    <div class="meta-info">
        <label>Дата</label>
        <input type="date" id="report-date">
        <div class="meta-row">
            <div>
                <label>Блок</label>
                <select id="block-num">
                    <option value="26">26</option><option value="27">27</option>
                    <option value="28">28</option><option value="29">29</option>
                    <option value="30">30</option><option value="31">31</option>
                    <option value="32">32</option><option value="33">33</option>
                    <option value="34">34</option><option value="35">35</option>
                </select>
            </div>
            <div>
                <label>Этаж</label>
                <select id="floor-num">
                    <option value="Крыша">Крыша</option>
                    <script>for(let i=24;i>=1;i--) document.write(`<option value="${i}">${i} эт.</option>`);</script>
                    <option value="-1">-1 эт.</option><option value="-2">-2 эт.</option>
                </select>
            </div>
        </div>
    </div>

    <hr style="border:0; border-top:1px solid #eee;">

    <select id="section" onchange="loadCategories()">
        <option value="">1. Выберите раздел...</option>
        <option value="Стр">Строительство</option>
        <option value="Эм">Электромонтаж</option>
        <option value="Мех">Механика</option>
    </select>
    <select id="category" onchange="loadItems()" style="display:none;"></select>
    
    <div id="items-container"></div>
    <button id="add-btn" style="display:none;" onclick="addToBasket()">➕ Добавить в список</button>

    <div id="summary-container"></div>
    <button id="submit-btn" style="display:none;" onclick="sendToBot()">🚀 Отправить Excel (0)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('report-date').valueAsDate = new Date();

        let finalBasket = []; 

        const allData = {
            "Эм": {
                "Авт. выкл.": ["Авт. выкл. 100-250А (шт)", "Авт. выкл. 40-80А (шт)", "Авт. выкл. 25-80А (шт)"],
                "Кабель Ал-й": ["АВВГ 3х185+1х120 (м)", "АВВГ 3х70+1х35 (м)", "АВВГ 5x70 (м)"],
                "Кабель Медь": ["ВВГ нг ls 3х1,5 (м)", "ВВГ нг ls 3х2,5 (м)", "ВВГ нг ls 5х16 (м)"]
            },
            "Мех": {
                "ППР 20": ["Труба ППР Ø20 (м)", "Муфта ППР Ø20 (шт)", "Вентиль ППР Ø20 (шт)"],
                "Радиатор": ["Установка радиатора (шт)", "Кран радиаторный (шт)"]
            },
            "Стр": {
                "Кладка": ["Газоблок 600*300*200 (шт)", "Газоблок 600*300*100 (шт)", "Сетка ВР 4 (м)"]
            }
        };

        function loadCategories() {
            const section = document.getElementById('section').value;
            const cat = document.getElementById('category');
            document.getElementById('items-container').innerHTML = '';
            if(!section) { cat.style.display='none'; return; }
            cat.innerHTML = '<option value="">2. Выберите категорию...</option>';
            for(let c in allData[section]) cat.innerHTML += `<option value="${c}">${c}</option>`;
            cat.style.display = 'block';
        }

        function loadItems() {
            const section = document.getElementById('section').value;
            const category = document.getElementById('category').value;
            const div = document.getElementById('items-container');
            div.innerHTML = '';
            if(!category) { document.getElementById('add-btn').style.display='none'; return; }
            allData[section][category].forEach((item, i) => {
                div.innerHTML += `<div class="item-row"><div class="item-name">${item}</div><input type="number" class="item-input" data-name="${item}" placeholder="0"></div>`;
            });
            document.getElementById('add-btn').style.display = 'block';
        }

        function addToBasket() {
            const block = document.getElementById('block-num').value;
            const floor = document.getElementById('floor-num').value;
            const inputs = document.querySelectorAll('.item-input');
            let hasData = false;

            inputs.forEach(input => {
                const val = parseFloat(input.value);
                if (val > 0) {
                    finalBasket.push({
                        block: block,
                        floor: floor,
                        name: input.getAttribute('data-name'),
                        value: val
                    });
                    input.value = ''; 
                    hasData = true;
                }
            });

            if(hasData) {
                renderSummary();
                tg.HapticFeedback.impactOccurred('medium');
            } else {
                tg.showAlert("Введите хотя бы один объем!");
            }
        }

        function renderSummary() {
            const container = document.getElementById('summary-container');
            container.innerHTML = '<b>К отправке:</b><br>';
            finalBasket.forEach((item, index) => {
                container.innerHTML += `
                    <div class="summary-item">
                        <span class="remove-btn" onclick="removeItem(${index})">✖</span>
                        <b>Блок ${item.block}, эт. ${item.floor}:</b><br>${item.name} — ${item.value}
                    </div>`;
            });
            const btn = document.getElementById('submit-btn');
            btn.style.display = finalBasket.length > 0 ? 'block' : 'none';
            btn.innerText = `🚀 Отправить Excel (${finalBasket.length})`;
        }

        function removeItem(index) {
            finalBasket.splice(index, 1);
            renderSummary();
        }

        function sendToBot() {
            const data = {
                date: document.getElementById('report-date').value,
                items: finalBasket
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
