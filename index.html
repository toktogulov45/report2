<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #28a745; --bg: #f4f4f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 100; }
        .tab { flex: 1; padding: 15px; text-align: center; font-weight: bold; color: #888; cursor: pointer; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .page { display: none; padding: 15px; padding-bottom: 100px; }
        .page.active { display: block; }
        .card { background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        select, input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .work-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .work-input { width: 80px; text-align: center; border: 1px solid var(--primary); padding: 8px; border-radius: 6px; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-add { background: var(--primary); color: #fff; }
        .btn-send { background: #007bff; color: #fff; position: fixed; bottom: 15px; left: 15px; width: calc(100% - 30px); }
        .db-item { display: flex; justify-content: space-between; padding: 8px; background: #fff; border-radius: 5px; margin-bottom: 4px; border: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('report-page')">📝 Отчет</div>
        <div class="tab" onclick="switchTab('db-page')">📊 База работ</div>
    </div>

    <div id="report-page" class="page active">
        <div class="card">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>Блок</label><select id="rep-block"></select></div>
                <div style="flex:1;"><label>Этаж</label><select id="rep-floor"></select></div>
            </div>
            <label>Категория</label>
            <select id="cat-select" onchange="renderWorkList()">
                <option value="">-- Выберите категорию --</option>
                <option value="Электромонтаж">Электромонтаж</option>
                <option value="Механика">Механика</option>
                <option value="Строительство">Строительство</option>
            </select>
        </div>
        <div id="work-list"></div>
        <button class="btn btn-add" id="add-btn" style="display:none;" onclick="addToBasket()">➕ В корзину</button>
        <div id="basket-view"></div>
        <button class="btn btn-send" id="send-btn" style="display:none;" onclick="sendData()">🚀 Отправить (0)</button>
    </div>

    <div id="db-page" class="page">
        <div class="card">
            <h4>➕ Новая работа</h4>
            <select id="new-cat">
                <option value="Электромонтаж">Электромонтаж</option>
                <option value="Механика">Механика</option>
                <option value="Строительство">Строительство</option>
            </select>
            <input type="text" id="new-name" placeholder="Название">
            <input type="text" id="new-unit" placeholder="Ед.изм (м, шт, м2)">
            <button class="btn" style="background:#6c757d; color:#fff;" onclick="saveNewWork()">💾 Сохранить</button>
        </div>
        <div id="full-db-view"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Начальный список (если память пуста)
        const initialWorks = [
            {cat: "Электромонтаж", name: "Монтаж кабеля 3х1.5", unit: "м"},
            {cat: "Механика", name: "Труба ППР 20", unit: "м"},
            {cat: "Строительство", name: "Газоблок 200", unit: "шт"}
            // Сюда можно добавить еще 200 позиций, но для теста оставим эти
        ];

        let workDB = JSON.parse(localStorage.getItem('gik_works_v3'));
        
        // Если в памяти ничего нет — берем начальный список
        if (!workDB || workDB.length === 0) {
            workDB = initialWorks;
            localStorage.setItem('gik_works_v3', JSON.stringify(workDB));
        }

        let basket = [];

        function init() {
            const bSel = document.getElementById('rep-block');
            [17,18,22,23,24,25,26,27,28,29].forEach(b => bSel.innerHTML += `<option value="${b}">${b}</option>`);
            const fSel = document.getElementById('rep-floor');
            for(let i=24; i>=1; i--) fSel.innerHTML += `<option value="${i}">${i}</option>`;
            renderDBList();
        }

        function switchTab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function renderWorkList() {
            const cat = document.getElementById('cat-select').value;
            const container = document.getElementById('work-list');
            container.innerHTML = '';
            const filtered = workDB.filter(x => x.cat === cat);
            
            if(filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.5;">Работ в этой категории пока нет. Добавьте их в "Базе".</div>';
                document.getElementById('add-btn').style.display = 'none';
                return;
            }

            filtered.forEach(w => {
                container.innerHTML += `
                    <div class="card work-row">
                        <div style="font-size:14px;">${w.name}<br><small style="color:green">${w.unit}</small></div>
                        <input type="number" step="any" class="work-input" data-name="${w.name}" data-unit="${w.unit}" placeholder="0">
                    </div>`;
            });
            document.getElementById('add-btn').style.display = 'block';
        }

        function addToBasket() {
            const block = document.getElementById('rep-block').value;
            const floor = document.getElementById('rep-floor').value;
            const date = new Date().toISOString().split('T')[0];
            const inputs = document.querySelectorAll('.work-input');
            
            inputs.forEach(input => {
                const val = parseFloat(input.value);
                if(val > 0) {
                    basket.push({ date, block, floor, name: input.dataset.name, value: val, unit: input.dataset.unit });
                    input.value = '';
                }
            });
            updateBasketUI();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function updateBasketUI() {
            const view = document.getElementById('basket-view');
            view.innerHTML = basket.length > 0 ? '<h4>В корзине:</h4>' : '';
            basket.forEach((item, i) => {
                view.innerHTML += `<div class="card" style="font-size:12px;"><b>Бл.${item.block}, эт.${item.floor}</b> | ${item.name}: ${item.value} ${item.unit}</div>`;
            });
            document.getElementById('send-btn').style.display = basket.length > 0 ? 'block' : 'none';
            document.getElementById('send-btn').innerText = `🚀 Отправить (${basket.length})`;
        }

        function saveNewWork() {
            const cat = document.getElementById('new-cat').value;
            const name = document.getElementById('new-name').value.trim();
            const unit = document.getElementById('new-unit').value.trim();
            if(!name || !unit) return tg.showAlert("Заполните все поля!");
            
            workDB.push({cat, name, unit});
            localStorage.setItem('gik_works_v3', JSON.stringify(workDB));
            document.getElementById('new-name').value = '';
            document.getElementById('new-unit').value = '';
            tg.showAlert("Добавлено!");
            renderDBList();
        }

        function renderDBList() {
            const container = document.getElementById('full-db-view');
            container.innerHTML = '<h4>Справочник:</h4>';
            workDB.forEach(w => {
                container.innerHTML += `<div class="db-item"><span>${w.name}</span><b>${w.unit}</b></div>`;
            });
        }

        function sendData() { tg.sendData(JSON.stringify({ items: basket })); }

        init();
    </script>
</body>
</html>
