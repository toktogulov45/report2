<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        h3 { margin-top: 0; text-align: center; }
        select, input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .item-name { flex: 1; padding-right: 10px; font-size: 14px; }
        .item-input { width: 80px; margin-bottom: 0; text-align: center; }
        #submit-btn { width: 100%; padding: 15px; background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <h3>Отчет по работам</h3>
    
    <select id="section" onchange="loadCategories()">
        <option value="">1. Выберите раздел...</option>
        <option value="Стр">Строительство</option>
        <option value="Эм">Электромонтаж</option>
        <option value="Мех">Механика</option>
    </select>
    
    <select id="category" onchange="loadItems()" style="display:none;"></select>
    
    <div id="items-container"></div>
    
    <button id="submit-btn" style="display:none;" onclick="sendData()">Отправить в базу</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем окно на весь экран телефона

        // СЮДА ВСТАВЬТЕ ВЕСЬ ВАШ СЛОВАРЬ (const allData = { "Эм": {...}, "Мех": {...}, "Стр": {...} });
        const allData = {
            "Мех": {
                "Подг. работы": ["Штробление стен (50х50) (кирпич)", "Отверстия до 108 мм (бетон до 15см)", "Отверстия до 108 мм (бетон до 40см)", "Отверстия 100х100мм (кирпич)", "Штробление стяжки 50х50мм", "Штробление стен 50х50мм"],
                "ППР 20": ["Монтаж труб Ø20 композит",  "Установка муфт/отводов Ø20", "Установка тройников Ø20", "Установка разъемов Ø20 вн резьба", "Установка вентилей ППР Ø20", "Установка шаблона душевого Ø20"],
                "ППР 25": ["Монтаж труб Ø25 композит", "Установка муфт/отводов Ø25", "Установка тройников Ø25", "Установка разъемов Ø25"],
                "ППР 32": ["Монтаж труб Ø32 композит", "Установка муфт/отводов Ø32", "Установка тройников Ø32", "Установка разъемов Ø32"],
                "Радиатор": ["Установка радиаторов", "Угловые краны радиаторов", "Установка терморегулятора", "Установка муфты Ø25 для радиатора"],
                "Трубы стальные": ["Монтаж трубы Ø15х2,5", "Монтаж трубы Ø20х2,5", "Монтаж трубы Ø25х2,8", "Монтаж трубы Ø32х2,8", "Монтаж трубы Ø40х3,0", "Монтаж трубы Ø57х3,0", "Монтаж трубы Ø76х3,2", "Монтаж трубы Ø89х3,5", "Монтаж трубы Ø108х3,5", "Монтаж трубы Ø159х4,0", "Покраска/грунтовка"],
                "Отводы сталь": ["Отвод Ø15-25 (гусак)", "Отвод Ø20", "Отвод Ø25", "Отвод Ø32", "Отвод Ø45", "Отвод Ø57", "Отвод Ø76", "Отвод Ø89", "Отвод Ø108", "Отвод Ø159"],
                "Запорная арматура": ["Кран шаровый 15", "Заглушка латунная", "Кран приварной Ду 20-25", "Кран приварной Ду 32", "Кран приварной Ду 40", "Кран приварной Ду 50", "Клапан фланцевый ASV-I Ду 50-65", "Клапан фланцевый ASV-I Ду 32-40", "Вентиль барашковый Ø25"],
                "Изоляция": ["Изоляция пластик", "Изоляция вспененная Ду 22", "Изоляция вспененная Ду 28", "Изоляция вспененная Ду 35", "Изоляция вспененная Ду 42", "Изоляция вспененная Ду 48", "Изоляция вспененная Ду 60", "Изоляция вспененная Ду 108"],
                "ПВХ": ["Труба ПВХ д150", "Труба ПВХ д100", "Труба ПВХ д50", "Фасонная часть ПВХ д150", "Фасонная часть ПВХ д100", "Фасонная часть ПВХ д50", "Хомут металл д150", "Хомут металл д100", "Хомут металл д50"],
                "Фаянс": ["Установка унитаза", "Установка умывальника", "Установка ванны", "Установка полотенцесушителя", "Смеситель умывальник", "Смеситель ванна", "Сифон умывальник", "Мойка кухня", "Смеситель мойка", "Сифон мойка", "Угловой кран д15"],
                "Оборудование": ["Насос Sololift", "Насос Гном", "Водомерный узел д80", "Водомерный узел д50", "Электрические клапаны", "Пожарная станция"]
            },
            "Эм": {
                "Подг. работы": ["Отверстие кирпич до 25мм", "Отверстие бетон до 25мм", "Штроба кирпич", "Штроба бетон", "Отверстие перекрытие д32"],
                "Авт. выкл.": ["Автомат (габарит 100) 100-250А", "Автомат (габарит 100) 40-80А", "Автомат 25-80А", "Автомат 1п 10-63А"],
                "Кабель Ал-й": ["3х185+1х120 АВВГ", "3х70+1х35 АВВГ", "1х120 АПВ", "1х35 АПВ", "3х240+1х120 АВВГ"],
                "Кабель Медь": ["3х1,5 ВВГнг-ls", "3х2,5 ВВГнг-ls", "3х4 ВВГнг", "1х6 / 1х16 ПВ3", "3х10 / 3х16 ВВГнг", "5х16 ВВГнг-ls", "5х2,5 ВВГнг-ls", "2х0,75 ТРП"],
                "Лотки": ["Лоток 300x50", "Лоток 200x50", "Лоток 100x50"],
                "Освещение": ["Светильник LED 36Вт", "Светильник LED 18Вт", "Светильник IP44", "Патрон Е27", "Выключатель скр. 1-2 клав."],
                "Этаж Квартира Щиты": ["ЩК Квартирный (Установка)", "ЩЭ Этажный (Установка)", "ЩК Квартирный (Сборка)", "ЩЭ Этажный (Сборка)"],
                "Трубы и прочее": ["Гофра Ф16мм", "Гофра Ф20мм", "Гофра Ф25мм", "Кабель-канал 25х16", "Гильза Ø57", "ПВД 20/25/32/50", "Металлорукав 19мм", "Полоса 40х4мм", "ЩДУП коробка"],
                "Щиты": ["ВРУ 1 (Уст/Сбор)", "ЩУР (Уст/Сбор)", "ЩВ", "ЩАО", "АВР", "ЩЛ Лифтов", "ЩНО Наружное", "ЩА Приточка", "ЩР"]
            },
            "Стр": {
                "Кладка": ["Газоблок 600*300*200", "Сетка ВР 4 (15см)", "Газоблок 600*300*100", "Сетка ВР 4 (10см)", "Арматура 6мм", "Сетка металл 10*10мм"],
                "Усиление стен": ["Уголок 50*50*5", "Уголок 40*40*4", "Полоса 40*3мм", "Арматура 10мм"],
                "Штукатурка": ["Бетоноконтакт", "Сетка ВР4 15*15", "Штукатурка стен", "Grender гипсовая", "Глат шпатлевка", "Финишная шпатлевка", "Покраска"]
            }
        };

        function loadCategories() {
            const section = document.getElementById('section').value;
            const catSelect = document.getElementById('category');
            document.getElementById('items-container').innerHTML = '';
            document.getElementById('submit-btn').style.display = 'none';

            if (!section) {
                catSelect.style.display = 'none';
                return;
            }

            catSelect.innerHTML = '<option value="">2. Выберите категорию...</option>';
            for (let cat in allData[section]) {
                catSelect.innerHTML += `<option value="${cat}">${cat}</option>`;
            }
            catSelect.style.display = 'block';
        }

        function loadItems() {
            const section = document.getElementById('section').value;
            const category = document.getElementById('category').value;
            const itemsDiv = document.getElementById('items-container');
            
            itemsDiv.innerHTML = '';

            if (!category) {
                document.getElementById('submit-btn').style.display = 'none';
                return;
            }

            const items = allData[section][category];
            items.forEach((item, index) => {
                itemsDiv.innerHTML += `
                    <div class="item-row">
                        <div class="item-name">${item}</div>
                        <input type="number" pattern="[0-9]*" inputmode="numeric" class="item-input" id="item-${index}" data-name="${item}" placeholder="0">
                    </div>
                `;
            });
            document.getElementById('submit-btn').style.display = 'block';
        }

        function sendData() {
            const inputs = document.querySelectorAll('.item-input');
            let report = [];
            
            // Собираем только те поля, где ввели цифры больше нуля
            inputs.forEach(input => {
                if (input.value && parseFloat(input.value) > 0) {
                    report.push({ name: input.getAttribute('data-name'), value: parseFloat(input.value) });
                }
            });

            if (report.length === 0) {
                tg.showAlert("Заполните хотя бы один объем работ!");
                return;
            }

            // Формируем финальный пакет данных
            const finalData = {
                section: document.getElementById('section').value,
                category: document.getElementById('category').value,
                items: report
            };

            // Отправляем JSON обратно в бота и закрываем окно
            tg.sendData(JSON.stringify(finalData));
        }
    </script>
</body>
</html>
