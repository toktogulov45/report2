    <meta charset="utf-8">

    <style>
        body { font-family: sans-serif; padding: 15px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        h3 { margin-top: 0; text-align: center; }
        select, input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; background: #fff; }
        
        .meta-row { display: flex; gap: 10px; }
        .meta-row > div { flex: 1; }
        label { font-size: 12px; margin-bottom: 5px; display: block; opacity: 0.8; font-weight: bold; }

        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .item-name { flex: 1; padding-right: 10px; font-size: 14px; }
        .item-input { width: 80px; margin-bottom: 0; text-align: center; }
        
        #submit-btn { width: 100%; padding: 15px; background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; margin-top: 20px; }

                    <script>
                        const floorSelect = document.currentScript.parentElement;
                        for (let i = 24; i >= 1; i--) {
                            let opt = document.createElement('option');
                            opt.value = i;
                            opt.innerHTML = i + ' этаж';
                            floorSelect.appendChild(opt);
                        }

                    <option value="-1">-1 этаж</option>

        function loadCategories() {
            const section = document.getElementById('section').value;
            const catSelect = document.getElementById('category');
            document.getElementById('items-container').innerHTML = '';
            document.getElementById('submit-btn').style.display = 'none';
            if (!section) { catSelect.style.display = 'none'; return; }
            catSelect.innerHTML = '<option value="">2. Выберите категорию...</option>';
            for (let cat in allData[section]) { catSelect.innerHTML += `<option value="${cat}">${cat}</option>`; }
            catSelect.style.display = 'block';
        }

        function loadItems() {
            const section = document.getElementById('section').value;
            const category = document.getElementById('category').value;
            const itemsDiv = document.getElementById('items-container');
            itemsDiv.innerHTML = '';
            if (!category) { document.getElementById('submit-btn').style.display = 'none'; return; }
            const items = allData[section][category];
            items.forEach((item, index) => {
                itemsDiv.innerHTML += `
                    <div class="item-row">
                        <div class="item-name">${item}</div>
                        <input type="number" pattern="[0-9]*" inputmode="numeric" class="item-input" id="item-${index}" data-name="${item}" placeholder="0">
                    </div>`;
            });
            document.getElementById('submit-btn').style.display = 'block';
        }

        function sendData() {
            const date = document.getElementById('report-date').value;
            const block = document.getElementById('block-num').value;
            const floor = document.getElementById('floor-num').value;

            if (!block || !floor) {
                tg.showAlert("Выберите Блок и Этаж!");
                return;
            }

            const inputs = document.querySelectorAll('.item-input');
            let report = [];
            inputs.forEach(input => {
                if (input.value && parseFloat(input.value) > 0) {
                    report.push({ name: input.getAttribute('data-name'), value: parseFloat(input.value) });
                }
            });

            if (report.length === 0) {
                tg.showAlert("Заполните хотя бы один объем работ!");
                return;
            }

            const finalData = {
                date: date,
                block: block,
                floor: floor,
                section: document.getElementById('section').value,
                category: document.getElementById('category').value,
                items: report
            };

            tg.sendData(JSON.stringify(finalData));
        }
